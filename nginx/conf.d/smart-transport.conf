# ──────────────────────────────────────────────────────────────
# Smart Transport AI — reverse proxy
# Remplacez "smart-transport.fr" par votre domaine LWS réel.
# ──────────────────────────────────────────────────────────────

upstream backend_api { server backend:8000; }
upstream frontend_app { server frontend:3000; }

# HTTP → redirige vers HTTPS (sauf challenge ACME/Certbot)
server {
    listen 80;
    server_name smart-transport.fr www.smart-transport.fr;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    http2 on;
    server_name smart-transport.fr www.smart-transport.fr;

    # Certificats Let's Encrypt (voir scripts/init-letsencrypt.sh)
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # En-têtes de sécurité
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # API FastAPI
    location /api/ {
        proxy_pass http://backend_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
    location /docs   { proxy_pass http://backend_api/docs; proxy_set_header Host $host; }
    location /redoc  { proxy_pass http://backend_api/redoc; proxy_set_header Host $host; }
    location /health { proxy_pass http://backend_api/health; }

    # Frontend Next.js
    location / {
        proxy_pass http://frontend_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
