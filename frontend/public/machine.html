<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Fiche machine — VGP</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { box-sizing: border-box; margin: 0; }
  body { font-family: "Segoe UI", Arial, sans-serif; background: #F1F5F9; color: #0F172A; }
  header { background: #0B1A2E; color: #fff; padding: 14px 16px; }
  header .t { font-size: 15px; font-weight: 700; }
  header .s { font-size: 11px; color: #94A3B8; }
  .wrap { max-width: 440px; margin: 18px auto; padding: 0 14px; }
  .card { background: #fff; border-radius: 14px; padding: 20px; box-shadow: 0 2px 10px rgba(15,23,42,.08); margin-bottom: 14px; text-align: center; }
  .parc { font-size: 24px; font-weight: 900; }
  .mod { color: #475569; margin-top: 2px; }
  .badge { display: inline-block; margin-top: 14px; font-size: 15px; font-weight: 800; padding: 9px 22px; border-radius: 99px; }
  .OK { background: #DCFCE7; color: #166534; }
  .BIENTOT { background: #FEF3C7; color: #92400E; }
  .EXPIREE { background: #FEE2E2; color: #991B1B; }
  .INCONNUE { background: #E2E8F0; color: #475569; }
  .dates { display: flex; justify-content: center; gap: 26px; margin-top: 16px; font-size: 12px; color: #475569; }
  .dates b { display: block; font-size: 14px; color: #0F172A; }
  a.doc { display: block; background: #2C5586; color: #fff; text-decoration: none; font-weight: 700; padding: 13px; border-radius: 10px; margin-top: 10px; }
  a.doc.sec { background: #fff; color: #2C5586; border: 2px solid #2C5586; }
  a.doc.off { background: #E2E8F0; color: #94A3B8; pointer-events: none; border: none; }
  .foot { text-align: center; color: #94A3B8; font-size: 10px; margin-top: 16px; }
  .err { text-align: center; color: #991B1B; padding: 30px 10px; font-weight: 700; }
</style>
</head>
<body>
<header>
  <div class="t">Contrôle machine — VGP</div>
  <div class="s">Accès Industrie · Smart Transport AI</div>
</header>
<div class="wrap" id="app">
  <div class="card" style="color:#64748B">Chargement de la fiche…</div>
</div>
<div class="foot">Vérification Générale Périodique — validité 6 mois (PEMP)</div>

<script>
const API = "/api/v1";
const parc = new URLSearchParams(location.search).get("parc");
const app = document.getElementById("app");

const lib = { OK: "✅ VGP À JOUR", BIENTOT: "⚠ VGP À RENOUVELER SOUS 30 J",
              EXPIREE: "⛔ VGP EXPIRÉE", INCONNUE: "VGP NON RENSEIGNÉE" };

(async () => {
  if (!parc) { app.innerHTML = '<div class="err">Aucun n° de parc dans le QR code.</div>'; return; }
  try {
    const r = await fetch(`${API}/vgp/public/${encodeURIComponent(parc)}`);
    if (!r.ok) throw new Error("machine inconnue au registre");
    const m = await r.json();
    app.innerHTML = `
      <div class="card">
        <div class="parc">PARC ${m.parc}</div>
        <div class="mod">${m.machine_modele || ""}</div>
        <div class="badge ${m.statut}">${lib[m.statut] || m.statut}</div>
        <div class="dates">
          <div>Dernière VGP<b>${m.date_vgp || "—"}</b></div>
          <div>Échéance<b>${m.echeance || "—"}</b></div>
        </div>
        ${m.numero_serie ? `<div style="margin-top:10px;font-size:11px;color:#64748B">N° de série : <b>${m.numero_serie}</b></div>` : ""}
        ${m.observations ? `<div style="margin-top:8px;text-align:left;font-size:11px;background:#FFF7ED;border:1px solid #FED7AA;color:#9A3412;border-radius:8px;padding:8px">📝 <b>Observations :</b> ${m.observations}</div>` : ""}
      </div>
      <a class="doc ${m.a_fichier_vgp ? "" : "off"}" href="${API}/vgp/public/${m.parc}/document/vgp" target="_blank">📄 Rapport de VGP (PDF)</a>
      <a class="doc sec ${m.a_fichier_notice ? "" : "off"}" href="${API}/vgp/public/${m.parc}/document/notice" target="_blank">📘 Notice d'utilisation (PDF)</a>`;
  } catch (e) {
    app.innerHTML = `<div class="err">Machine « ${parc} » introuvable au registre VGP.</div>`;
  }
})();
</script>
</body>
</html>
